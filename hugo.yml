baseURL: "https://kmmm99.github.io/"
languageCode: ja
title: "massan’s Daily Notes"
theme: "PaperMod"
pagination:
  pagerSize: 5

params:
  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  showtoc: true
  env: production
  description: "massanの個人ブログです"
  author: "massan"

  assets:
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"

  homeInfoParams:
    Title: "massan's Daily Notes"
    Content: "長文書きたいときに使うかもしれないブログです。"

  socialIcons:
    - name: github
      url: "https://github.com/kmmm99"
    - name: X
      url: "https://x.com/massan_mrk"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: "検索"
      url: /search/
      weight: 5
    - identifier: archive
      name: "アーカイブ"
      url: /archives/
      weight: 10
    - identifier: tags
      name: "タグ"
      url: /tags/
      weight: 20

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
